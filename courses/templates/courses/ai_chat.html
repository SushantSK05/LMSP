{% extends 'base.html' %}

{% block title %}AI Chat Assistant{% endblock %}

{% block content %}
<style>
    /* Make the page fit in one frame */
    body { 
        overflow: hidden; 
    }
    footer { 
        display: none !important; 
    }
    nav { 
        margin-bottom: 0 !important; 
    }
    
    .chat-page-wrapper {
        height: calc(100vh - 65px); /* Nav height approx 65px */
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        background: var(--bg-color);
    }

    .chat-frame {
        flex: 1;
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        background: var(--card-bg);
        overflow: hidden;
        box-shadow: var(--shadow);
    }

    .chat-header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
        background: var(--card-bg);
    }

    .chat-header h1 {
        font-size: 1.25rem;
        margin: 0;
    }

    .chat-header p {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin: 0;
    }
</style>

<div class="chat-page-wrapper">
    <div class="chat-frame">
        <div class="chat-header">
            <h1>AI Learning Assistant</h1>
            <p>Ask questions about your courses or get help with complex topics.</p>
        </div>

        <div id="chat-messages" style="flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;">
            <div style="background: var(--border-color); padding: 1rem; border-radius: 12px 12px 12px 0; align-self: flex-start; max-width: 80%;">
                <p>Hello! I'm your EduCore AI assistant. How can I help you today?</p>
            </div>
        </div>

        <div style="padding: 1rem; border-top: 1px solid var(--border-color); background: var(--nav-bg);">
            <form id="chat-form" style="display: flex; gap: 0.5rem;">
                <input type="text" id="chat-input" placeholder="Type your message..." style="flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 20px; outline: none; background: var(--bg-color); color: var(--text-color);">
                <button type="submit" class="btn btn-primary" style="border-radius: 20px; padding: 0.75rem 1.5rem;">Send</button>
            </form>
        </div>
    </div>
</div>

<script>
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;

        // Add user message
        addMessage(message, 'user');
        chatInput.value = '';

        // Add loading message
        const loadingId = 'loading-' + Date.now();
        addMessage("Thinking...", 'ai', loadingId);

        try {
            const response = await fetch("/ai-chat-response/", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            
            // Remove loading message
            document.getElementById(loadingId).remove();

            if (data.response) {
                addMessage(data.response, 'ai');
            } else {
                addMessage("Error: " + (data.error || "Failed to get response"), 'ai');
            }
        } catch (error) {
            document.getElementById(loadingId).remove();
            addMessage("Error: Could not connect to the AI service.", 'ai');
        }
    });

    function addMessage(text, sender, id = null) {
        const div = document.createElement('div');
        if (id) div.id = id;
        div.style.padding = '1rem';
        div.style.borderRadius = '12px';
        div.style.maxWidth = '80%';
        div.style.wordBreak = 'break-word';
        div.style.whiteSpace = 'pre-wrap';
        
        if (sender === 'user') {
            div.style.background = 'var(--accent-color)';
            div.style.color = '#fff';
            div.style.alignSelf = 'flex-end';
            div.style.borderRadius = '12px 12px 0 12px';
        } else {
            // Check if it's an error message
            if (text.startsWith("Error:")) {
                div.style.background = '#fee2e2';
                div.style.color = '#991b1b';
                div.style.border = '1px solid #fecaca';
            } else {
                div.style.background = 'var(--border-color)';
                div.style.color = 'var(--text-color)';
            }
            div.style.alignSelf = 'flex-start';
            div.style.borderRadius = '12px 12px 12px 0';
        }

        const p = document.createElement('p');
        p.textContent = text;
        div.appendChild(p);
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>
{% endblock %}
